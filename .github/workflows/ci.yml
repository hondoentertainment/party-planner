name: CI

# Repository secrets (Settings → Secrets and variables → Actions), all optional:
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY — real app URL + anon key so the build is not the empty setup screen.
#   E2E_EMAIL, E2E_PASSWORD — dedicated Auth user; without these, signed-in Playwright tests are skipped.
# See README "E2E and CI" and OPERATIONS.md §7.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Lint, build, and E2E
        run: npm run verify
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
